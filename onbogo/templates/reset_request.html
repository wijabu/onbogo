{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="row flex-fill">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title logo">reset password</h5>
                    <p class="text-secondary">Enter your account email and we'll send a reset link. The link expires in 1 hour.</p>
                    <form action="{{ url_for('auth.reset_request') }}" method="POST" class="validated-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="email">email</label>
                            <input class="form-control" type="email" name="email" id="email" autofocus required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-secondary btn-block logo">send reset link</button>
                        </div>
                    </form>
                    <br>
                    <hr>
                    <a class="dropdown-item" href="{{ url_for('auth.login') }}">Back to <span class="txt-green">login</span></a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
