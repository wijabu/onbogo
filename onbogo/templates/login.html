{% extends "base.html" %}
{% block title %}Login Page{% endblock %}

{% block end_scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var form = document.querySelector('form[action="/login"]');
        if (!form) return;
        form.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                form.submit();
            }
        });
    });
</script>
{% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="row flex-fill">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title logo">login</h5>
                    <form action="/login" method="POST" class="validated-form" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="email">email</label>
                            <input class="form-control" type="text" name="email" id="email" autofocus required>
                            <div class="valid-feedback">
                                Looks good!
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">password</label>
                            <input class="form-control" type="password" name="password" id="password" required>
                            <div class="valid-feedback">
                                Looks good!
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-secondary btn-block logo">login</button>
                        </div>
                    </form>
                    <br>
                    <hr>
                        <a class="dropdown-item" href="/register">New around here? <span class="txt-green">Sign up</span></a>
                        <a class="dropdown-item txt-green" href="{{ url_for('auth.reset_request') }}">Forgot password?</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
